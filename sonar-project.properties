# SonarCloud configuration — project: jcmoro_code-challenger-check
# Run a scan with: make sonar (requires SONAR_TOKEN env var).

sonar.projectKey=jcmoro_code-challenger-check
sonar.organization=jcmoro
sonar.sourceEncoding=UTF-8

# Sources & tests (multi-module monorepo: backend PHP + frontend Vue/TS)
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/tests

# Exclusions (vendored deps, build artefacts, framework cache)
sonar.exclusions=**/vendor/**,**/node_modules/**,**/var/**,**/dist/**,**/public/build/**,**/coverage/**

# PHP coverage (Clover from PHPUnit + pcov)
sonar.php.coverage.reportPaths=backend/var/coverage/clover.xml

# JS/TS coverage (LCOV from Vitest + v8)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# ---------------------------------------------------------------------------
# Rule overrides — narrow, file-scoped, with documented rationale.
# Each entry exists because the rule's premise doesn't apply in that file,
# not to silence a real warning. Reviewable without leaving this file.
# ---------------------------------------------------------------------------

sonar.issue.ignore.multicriteria=\
    phpDtoNaming1,\
    phpDtoNaming2,\
    phpProviderReturns1,\
    phpProviderReturns2

# php:S116 — DTOs intentionally mirror the wire format (snake_case in JSON
# / XML). Renaming would force #[SerializedName(...)] on every field or
# break the public API contract.
sonar.issue.ignore.multicriteria.phpDtoNaming1.ruleKey=php:S116
sonar.issue.ignore.multicriteria.phpDtoNaming1.resourceKey=**/Http/Dto/**

sonar.issue.ignore.multicriteria.phpDtoNaming2.ruleKey=php:S116
sonar.issue.ignore.multicriteria.phpDtoNaming2.resourceKey=**/Provider*Request.php

# php:S1142 — provider adapters parse untrusted external input (JSON,
# XML, CSV) with guard clauses. Collapsing to a single return nests
# deeper and worsens cognitive complexity.
sonar.issue.ignore.multicriteria.phpProviderReturns1.ruleKey=php:S1142
sonar.issue.ignore.multicriteria.phpProviderReturns1.resourceKey=**/Infrastructure/Provider/**/*Client.php

sonar.issue.ignore.multicriteria.phpProviderReturns2.ruleKey=php:S1142
sonar.issue.ignore.multicriteria.phpProviderReturns2.resourceKey=**/UI/Http/Controller/Provider*Controller.php
