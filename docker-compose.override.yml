# Dev-only overrides. Picked up automatically by `docker compose`.
# Adds: keep frontend container alive even without package.json (already in its CMD),
# and isolate node_modules into a named volume so host bind-mount doesn't shadow it.
services:
  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
